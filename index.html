<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAI SURYA DIGITALS | Photography</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0b0b0b;
    color: white;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    padding: 20px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

nav ul {
    display: flex;
    gap: 25px;
}

nav ul li {
    list-style: none;
}

nav ul li a {
    color: white;
    text-decoration: none;
}

nav ul li a:hover {
    color: #ff3c1f;
}

/* HERO */
.hero {
    display: flex;
    height: 100vh;
}

/* LEFT */
.hero-left {
    width: 50%;
    padding: 100px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 2;
}

.tag {
    color: #ff3c1f;
    margin-bottom: 20px;
}

.hero-left h1 {
    font-size: clamp(28px, 5vw, 55px);
    line-height: 1.2;
}

.btn {
    margin-top: 30px;
    background: #ff3c1f;
    padding: 12px 25px;
    color: white;
    text-decoration: none;
}

/* RIGHT */
.hero-right {
    width: 50%;
    position: relative;
}

.hero-right img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.hero-right::before {
    content: "";
    position: absolute;
    left: -120px;
    width: 220px;
    height: 100%;
    background: #0b0b0b;
    transform: skewX(-20deg);
}

/* SECTION */
section {
    padding: 80px 50px;
    text-align: center;
}

/* SERVICES */
.services {
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    width: 260px;
    padding: 25px;
    background: #111;
    border-radius: 10px;
}

.card:hover {
    transform: translateY(-10px);
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

/* CONTACT */
.contact {
    background: #111;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    color: white;
}

/* MOBILE */
@media(max-width:768px){

    nav {
        flex-direction: column;
    }

    nav ul {
        flex-direction: column;
        margin-top: 10px;
    }

    .hero {
        flex-direction: column;
        height: auto;
    }

    .hero-left {
        width: 100%;
        padding: 40px 20px;
        text-align: center;
    }

    .hero-right {
        width: 100%;
        height: 300px;
    }

    .hero-right::before {
        display: none;
    }

    .services {
        flex-direction: column;
    }

    .card {
        width: 90%;
    }
}
</style>
</head>

<body>

<nav>
    <h1>SAI SURYA DIGITALS</h1>
    <ul>
        <li><a href="#services">Services</a></li>
        <li><a href="#portfolio">Gallery</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<div class="hero">
    <div class="hero-left">
        <p class="tag">— CREATIVE PHOTOGRAPHY</p>
        <h1>
            PHOTOGRAPHY <br>
            MAKE US HAPPY <br>
            TAKE A SHOT.
        </h1>
        <a href="#portfolio" class="btn">WATCH PORTFOLIO</a>
    </div>

    <div class="hero-right">
        <img src="GPHE2659.JPG">
    </div>
</div>

<section id="services">
    <h2>Our Services</h2>
    <div class="services">
        <div class="card"><h3>Wedding</h3></div>
        <div class="card"><h3>Videography</h3></div>
        <div class="card"><h3>Drone</h3></div>
    </div>
</section>

<section id="portfolio">
    <h2>Portfolio</h2>
    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1504208434309-cb69f4fe52b0">
        <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
    </div>
</section>

<section id="contact" class="contact">
    <h2>Contact</h2>
    <p>+91 9848909443</p>
</section>

<a class="whatsapp"
href="https://api.whatsapp.com/send?phone=919848909443"
target="_blank">💬</a>

</body>
</html>
